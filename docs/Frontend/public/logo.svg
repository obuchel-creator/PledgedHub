<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle with Gradient -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4285f4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#667eea;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="innerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main Circle -->
  <circle cx="100" cy="100" r="95" fill="url(#logoGradient)"/>
  
  <!-- Inner decorative circle -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="3"/>
  
  <!-- Letter O with handshake symbol inside -->
  <text x="100" y="130" font-family="'Google Sans', 'Roboto', Arial, sans-serif" font-size="100" font-weight="700" fill="white" text-anchor="middle">O</text>
  
  <!-- Handshake hands inside the O -->
  <g transform="translate(100, 100)">
    <!-- Left hand -->
    <path d="M -25 -10 L -25 5 L -15 10 L -10 10 L -5 5" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    <!-- Right hand -->
    <path d="M 25 -10 L 25 5 L 15 10 L 10 10 L 5 5" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    <!-- Connection -->
    <path d="M -5 5 L 5 5" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.9"/>
  </g>
  
  <!-- Shine effect -->
  <circle cx="70" cy="70" r="20" fill="white" opacity="0.2"/>
  <circle cx="75" cy="75" r="10" fill="white" opacity="0.3"/>
</svg>
